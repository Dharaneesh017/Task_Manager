<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Task Manager</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }

        body {
            background: #eef2f7;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 20px;
        }

        .app-card {
            background: white;
            width: 100%;
            height: 700px;
            max-width: 600px;
            max-height: 1000px;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.1);
        }

        h1 {
            text-align: center;
            margin-bottom: 25px;
            color: #333;
            font-weight: 600;
        }

        .input-group {
            margin-bottom: 15px;
        }

        input,
        textarea {
            width: 100%;
            border: 1px solid #ddd;
            padding: 12px;
            border-radius: 10px;
            font-size: 15px;
            outline: none;
            margin-bottom: 10px;
        }

        input:focus,
        textarea:focus {
            border-color: #6366f1;
        }

        .save-btn {
            background: #6366f1;
            color: white;
            border: none;
            padding: 12px;
            border-radius: 10px;
            cursor: pointer;
            font-weight: 600;
            width: 100%;
        }

        .task-list {
            margin-top: 30px;
        }

        .task-item {
            background: #f9fafb;
            padding: 15px;
            border-radius: 12px;
            margin-bottom: 12px;
            border: 1px solid #eee;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .task-info h3 {
            font-size: 16px;
            margin-bottom: 4px;
        }

        .task-info p {
            font-size: 13px;
            color: #666;
        }

        .badge {
            font-size: 10px;
            text-transform: uppercase;
            font-weight: 700;
            background: #ddd;
            padding: 2px 6px;
            border-radius: 4px;
        }

        .badge-completed {
            background: #dcfce7;
            color: #15803d;
        }

        .actions {
            display: flex;
            gap: 5px;
        }

        .action-btn {
            border: none;
            padding: 6px 10px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 12px;
            color: white;
        }

        .done-btn {
            background: #10b981;
        }

        .del-btn {
            background: #ef4444;
        }
    </style>
</head>

<body>
    <div class="app-card">
        <h1>Task Manager</h1>

        <div class="input-group">
            <input type="text" id="title" placeholder="Task Title">
            <textarea id="description" placeholder="Description..." rows="1"></textarea>
        </div>

        <button class="save-btn" onclick="saveTask()">Add Task</button>

        <div id="tasks" class="task-list"></div>
    </div>

    <script>
        async function fetchTasks() {
            const res = await fetch('/tasks');
            const data = await res.json();
            const list = document.getElementById('tasks');
            list.innerHTML = '';

            data.tasks.forEach(task => {
                const item = document.createElement('div');
                item.className = 'task-item';
                item.innerHTML = `
                    <div class="task-info">
                        <h3>${task.title} ${task.status === 'completed' ? '<span class="badge badge-completed">Done</span>' : ''}</h3>
                        <p>${task.description || ''}</p>
                    </div>
                    <div class="actions">
                        ${task.status !== 'completed' ? `<button class="action-btn done-btn" onclick="updateStatus(${task.id}, 'completed')">✓</button>` : ''}
                        <button class="action-btn del-btn" onclick="deleteTask(${task.id})">✕</button>
                    </div>
                `;
                list.appendChild(item);
            });
        }

        async function saveTask() {
            const t = document.getElementById('title');
            const d = document.getElementById('description');
            if (!t.value.trim()) return;

            await fetch('/tasks', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ title: t.value, description: d.value })
            });

            t.value = '';
            d.value = '';
            fetchTasks();
        }

        async function updateStatus(id, status) {
            await fetch(`/tasks/${id}`, {
                method: 'PUT',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ status })
            });
            fetchTasks();
        }

        async function deleteTask(id) {
            if (!confirm('Remove this task?')) return;
            await fetch(`/tasks/${id}`, { method: 'DELETE' });
            fetchTasks();
        }

        fetchTasks();
    </script>
</body>

</html>
